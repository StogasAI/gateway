name: Gateway IGVM Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: gateway-igvm-release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build IGVM Release
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Validate tag
        run: '[[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]'

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Verify checked-out tag
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          test "$(git rev-list -n1 "$tag")" = "$(git rev-parse HEAD)"

      - name: Verify release pins
        run: node stogas/release/scripts/verify-pins.mjs --network

      - name: Restore Stogas release vendor cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: stogas/release/vendor
          key: stogas-release-vendor-${{ runner.os }}-${{ hashFiles('transports/go.mod', 'transports/go.sum', 'core/go.mod', 'core/go.sum', 'stogas/release/locks/*.Cargo.lock', 'stogas/release/patches/*.patch', 'stogas/release/pins.lock.json', 'stogas/release/guix/channels.scm') }}

      - name: Install pinned Guix bootstrap
        run: stogas/release/scripts/install-guix-bootstrap.sh

      - name: Build IGVM in pinned Guix environment
        env:
          STOGAS_RELEASE_CI_SKIP_REBUILD_CHECK: "1"
        run: stogas/release/scripts/build-release.sh "$GITHUB_REF_NAME" "dist/gateway/$GITHUB_REF_NAME"

      - name: Verify release checksums
        run: |
          set -euo pipefail
          cd "dist/gateway/$GITHUB_REF_NAME"
          sha256sum -c SHA256SUMS

      - name: Generate GitHub artifact attestation
        id: attest
        uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4
        with:
          subject-path: dist/gateway/${{ github.ref_name }}/gateway.igvm

      - name: Collect official GitHub attestation evidence
        run: cp "${{ steps.attest.outputs.bundle-path }}" "dist/gateway/${{ github.ref_name }}/github-attestation.jsonl"

      - name: Collect Sigstore trust evidence
        run: node stogas/release/scripts/fetch-sigstore-trust-bundle.mjs "dist/gateway/${{ github.ref_name }}/sigstore-trust-bundle.json"

      - name: Verify release payload file set
        run: |
          set -euo pipefail
          cd "dist/gateway/$GITHUB_REF_NAME"
          expected_files=(
            gateway.igvm
            gateway.efi
            gateway.init
            gateway.kernel
            gateway.initramfs.cpio.zst
            launch-measurement.txt
            release-manifest.json
            pins.lock.json
            SHA256SUMS
            igvmmeasure-check-kvm.txt
            ukify-inspect.txt
            guix-describe.txt
            guix-store-requisites.txt
            kernel-config.txt
            build-inputs.sha256
            github-attestation.jsonl
            sigstore-trust-bundle.json
          )
          actual_files="$(find . -maxdepth 1 -type f -printf '%P\n' | LC_ALL=C sort)"
          expected_file_list="$(printf '%s\n' "${expected_files[@]}" | LC_ALL=C sort)"
          if [ "$actual_files" != "$expected_file_list" ]; then
            echo "release payload contains unexpected files" >&2
            printf 'expected files:\n%s\nactual files:\n%s\n' "$expected_file_list" "$actual_files" >&2
            exit 70
          fi

      - name: Upload release payload for publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gateway-release-${{ github.ref_name }}
          path: dist/gateway/${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish Draft Release
    runs-on: ubuntu-24.04
    needs: build
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Verify checked-out tag
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          test "$(git rev-list -n1 "$tag")" = "$(git rev-parse HEAD)"

      - name: Download release payload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: gateway-release-${{ github.ref_name }}
          path: dist/gateway/${{ github.ref_name }}

      - name: Verify downloaded release checksums
        run: |
          set -euo pipefail
          cd "dist/gateway/$GITHUB_REF_NAME"
          sha256sum -c SHA256SUMS

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          release_commit="$(git rev-parse HEAD)"
          test "$(git rev-list -n1 "$tag")" = "$release_commit"
          ASSETS=(
            "dist/gateway/$tag/gateway.igvm"
            "dist/gateway/$tag/gateway.efi"
            "dist/gateway/$tag/gateway.init"
            "dist/gateway/$tag/gateway.kernel"
            "dist/gateway/$tag/gateway.initramfs.cpio.zst"
            "dist/gateway/$tag/launch-measurement.txt"
            "dist/gateway/$tag/release-manifest.json"
            "dist/gateway/$tag/pins.lock.json"
            "dist/gateway/$tag/SHA256SUMS"
            "dist/gateway/$tag/igvmmeasure-check-kvm.txt"
            "dist/gateway/$tag/ukify-inspect.txt"
            "dist/gateway/$tag/guix-describe.txt"
            "dist/gateway/$tag/guix-store-requisites.txt"
            "dist/gateway/$tag/kernel-config.txt"
            "dist/gateway/$tag/build-inputs.sha256"
            "dist/gateway/$tag/github-attestation.jsonl"
            "dist/gateway/$tag/sigstore-trust-bundle.json"
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${ASSETS[@]}" --clobber
            gh release edit "$tag" --draft=true --target "$release_commit"
          else
            gh release create "$tag" "${ASSETS[@]}" --draft --verify-tag --target "$release_commit" --title "Gateway $tag"
          fi
