name: PR Dependencies

on:
  pull_request:
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - ".github/workflows/pr-dependencies.yml"
      - "stogas/release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-vendor:
    name: Verify Go Vendor State
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Verify release pins
        run: node stogas/release/scripts/verify-pins.mjs
      - name: Restore Stogas release vendor cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: stogas/release/vendor
          key: stogas-release-vendor-${{ runner.os }}-${{ hashFiles('transports/go.mod', 'transports/go.sum', 'core/go.mod', 'core/go.sum', 'stogas/release/locks/*.Cargo.lock', 'stogas/release/patches/*.patch', 'stogas/release/pins.lock.json', 'stogas/release/guix/channels.scm') }}
          restore-keys: |
            stogas-release-vendor-${{ runner.os }}-
      - name: Install pinned Guix bootstrap
        run: stogas/release/scripts/install-guix-bootstrap.sh
      - name: Verify Go module hydration
        run: stogas/release/scripts/hydrate-go-vendor.sh
      - name: Run Go vulnerability scan
        run: |
          set -euo pipefail
          cd transports
          GOWORK=off go install golang.org/x/vuln/cmd/govulncheck@latest
          GOWORK=off "$(go env GOPATH)/bin/govulncheck" ./...
      - name: Verify module files did not change
        run: git diff --exit-code -- transports/go.mod transports/go.sum
