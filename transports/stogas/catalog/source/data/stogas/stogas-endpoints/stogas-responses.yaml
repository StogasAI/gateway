---
stogasEndpoints:
  schema:
    path: /v1/responses
    method: POST
    headers:
      authorization:
        required: true
        type: string
        schema: { type: string }
      api-key:
        required: false
        type: string
        schema: { type: string }
        alias: schema.headers.authorization
      x-api-key:
        required: false
        type: string
        schema: { type: string }
        alias: schema.headers.authorization
      x-goog-api-key:
        required: false
        type: string
        schema: { type: string }
        alias: schema.headers.authorization
      content-type:
        required: true
        type: string
        values: [application/json]
        schema:
          type: string
          enum: [application/json]
      accept:
        required: false
        type: string
        values: [application/json, text/event-stream]
        schema:
          type: string
          enum: [application/json, text/event-stream]
      x-stogas-return-extra-fields:
        required: false
        type: string
        schema: { type: string }
    parameters:
      model:
        required: true
        type: string
      input:
        required: true
        type: union
      stream:
        required: false
        type: boolean
      background:
        required: false
        type: boolean
      conversation:
        required: false
        type: string
      include:
        required: false
        type: array
      instructions:
        required: false
        type: string
      max_output_tokens:
        required: false
        type: number
        min: 1
      max_tool_calls:
        required: false
        type: integer
        min: 1
      metadata:
        required: false
        type: object
      parallel_tool_calls:
        required: false
        type: boolean
      previous_response_id:
        required: false
        type: string
      prompt_cache_key:
        required: false
        type: string
      reasoning:
        required: false
        type: object
        rejectUnsupported: model.reasoning
      safety_identifier:
        required: false
        type: string
      service_tier:
        required: false
        type: string
        values: [auto, default, flex, priority]
      stream_options:
        required: false
        type: object
      store:
        required: false
        type: boolean
      temperature:
        required: false
        type: number
        min: 0
        max: 2
      text:
        required: false
        type: object
      top_logprobs:
        required: false
        type: integer
        min: 0
      top_p:
        required: false
        type: number
        min: 0
        max: 1
      tool_choice:
        required: false
        type: union
      tools:
        required: false
        type: array
      truncation:
        required: false
        type: string
        values: [auto, disabled]
      user:
        required: false
        type: string
      frequency_penalty:
        required: false
        type: number
        min: -2
        max: 2
      presence_penalty:
        required: false
        type: number
        min: -2
        max: 2
      prompt_cache_retention:
        required: false
        type: string
        values: [in-memory, 24h]
      reasoning.effort:
        required: false
        type: string
        values: [none, minimal, low, medium, high, xhigh]
        rejectUnsupported: model.reasoning
